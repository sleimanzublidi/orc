# A simple workflow to verify your Claude Code provider setup.
name: ask-claude
description: Asks Claude Code a question to verify the provider is working.

input:
  - name: question
    type: string
    required: false

nodes:
  - id: ask
    agent: claude-code
    prompt: "Do not read or explore any files. Just answer this question: {{question | default: What is Orc? Answer in one sentence.}}"
    output: answer

output:
  response: "{{answer}}"
