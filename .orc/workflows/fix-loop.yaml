# Iterative code review loop — reviews changes, fixes issues, repeats until clean.
#
# Each loop iteration: review the diff, fix any findings, output verdict.
# Stops when APPROVED or after 3 iterations.
#
# Usage:
#   orc start fix-loop
name: fix-loop
description: Iterative code review and fix loop that reviews changes, fixes issues, and repeats until no issues remain or 3 iterations.

nodes:
  - id: review-fix
    agent: claude-code
    prompt: |
      You are a senior engineer who reviews code and fixes issues in one pass.

      Follow these steps exactly:

      **REVIEW PHASE**

      1. **Prepare**:
         - Read CLAUDE.md and CONTRIBUTING.md (if they exist) for conventions and requirements.
         - Read `{{orc_root}}/reviews/known-issues.md` if it exists. Issues listed there have been previously triaged and intentionally accepted — do NOT re-flag them.
         - Read all existing `iteration-*.md` files in `{{orc_root}}/reviews/` to understand what was found and fixed in prior iterations. Focus on verifying prior fixes and finding new issues — do NOT re-flag issues that were already fixed.

      2. **Gather changes**:
         - If prior iteration reports exist in `{{orc_root}}/reviews/`, focus on recent fixes: use `git diff HEAD~1` for the last fix commit. Also check any unresolved findings from prior reports.
         - If no prior iteration reports exist, review the full branch diff: `git diff main..HEAD` and `git log main..HEAD --oneline`.

      3. **Review**: Analyze changes for:
         - Correctness — logic bugs, off-by-one, nil/null safety, concurrency issues
         - Spec compliance — validate against repo docs/requirements
         - Code conventions — naming, structure, patterns per repo guidelines
         - Documentation accuracy — comments match code, docs reflect changes
         - Security — injection, unsafe operations, credential exposure
         - Test coverage — are new code paths tested?

         Report only P0 and P1 findings. Do not report style suggestions or nice-to-haves.
         Exclude any finding that matches an entry in `known-issues.md`.

         Priorities: **P0** must fix (bugs, security, spec violations) · **P1** should fix (conventions, tests, docs)

      4. **If zero findings**, save the report (step 5) and output ONLY `APPROVED`. Do NOT proceed to the fix phase.

      5. **Save report**: Record the start timestamp with `date '+%Y%m%d-%H%M%S'`.
         Determine the iteration number by counting existing `iteration-*.md` files in `{{orc_root}}/reviews/` (first run = 1).
         Create `{{orc_root}}/reviews/` if needed. Write to `{{orc_root}}/reviews/iteration-<TIMESTAMP>-<N>.md`:

         ```
         # Review & Fix — Iteration N
         **Branch:** (name) | **Timestamp:** (date/time)

         ## Findings
         ### [P0] <title>
         - **File**: path/to/file:line
         - **Category**: bug | spec-violation | convention | security | docs | test-gap
         - **Issue**: what's wrong
         - **Fix**: how to fix
         - **Status**: Fixed | Skipped
         - **Action**: (what changed, or why skipped)

         (repeat for each finding)

         ## Build Verification
         (pass/fail — filled after fix phase, or N/A if APPROVED)

         ## Verdict
         APPROVED | NEEDS_WORK (N findings: X fixed, Y skipped)
         ```

      **FIX PHASE** (only if there are findings)

      6. **Triage findings**: For each finding, decide:
         - **Address**: the finding is valid per repo guidelines
         - **Skip**: the finding conflicts with repo docs, is already correct, or is a false positive

      7. **Fix by priority**: Address P0 first, then P1.
         - Verify fixes don't introduce regressions — build and run tests.

      8. **Record known issues**: For any finding marked as **Skip**, append a line to `{{orc_root}}/reviews/known-issues.md`. Create the file if it doesn't exist. Format — one finding per line:

         ```
         - <short-id>: <title> — <reason> (path/to/file, YYYY-MM-DD)
         ```

         If the file already exists, read it first and avoid duplicates (match by short-id).

      9. **Update the report**: Fill in the Status, Action, and Build Verification fields in the report file saved in step 5.

      10. **Commit**: Stage ALL modified files (code + reports + known-issues.md) and commit with message: `[Claude] Address code review iteration (N) findings`.

      11. **Output**: Output `NEEDS_WORK`.
    output: review_result
    loop:
      until: approved
      max_iterations: 3
      fresh_context: true

output:
  review: "{{review_result}}"
