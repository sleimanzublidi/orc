# Tool validation workflow — builds the binary, then runs validate.sh in a loop.
# If validation fails, a fixer agent reads the output and patches the code.
# Repeats until validate.sh passes or max iterations reached.
#
# Usage:
#   orc start tool-validation
#   orc start tool-validation --input agent="copilot"
#   orc start tool-validation --input worktree_path="/path/to/worktree"
name: tool-validation
description: Build and validate the orc binary via smoke tests. Loops fix attempts until validation passes.

input:
  - name: agent
    type: string
    default: "claude-code"
  - name: worktree_path
    type: string
    default: "{{repo_root}}"

nodes:
  - id: build
    agent: shell
    command: "cd {{worktree_path}} && bash Scripts/build.sh"
    on_failure: continue
    output: build_result

  - id: validate-fix
    agent: "{{agent}}"
    depends_on: build
    parameters:
      permission_mode: dontAsk
    prompt: |
      The build or validate step needs to be verified. Here is the output from the last run:

      ```
      {{last_output | default: (first run — no previous output)}}
      ```

      Work exclusively in the git worktree at `{{worktree_path}}`.

      1. Run `cd {{worktree_path}} && bash Scripts/validate.sh` yourself to reproduce the failures.
      2. Read the failing assertion(s) and trace them back to the orc source code.
      3. Fix the root cause in the Swift source — do NOT weaken assertions or edit validate.sh.
      4. Rebuild with `cd {{worktree_path}} && bash Scripts/build.sh`.
      5. Re-run `cd {{worktree_path}} && bash Scripts/validate.sh` to confirm your fix.
      6. When validation passes, output ONLY `APPROVED`.
    output: fix_result
    loop:
      until: approved
      max_iterations: 5

output:
  result: "{{fix_result}}"
