# Self-improvement workflow — generates product and engineering ideas, debates them,
# implements the best, then runs a fix-loop to clean up.
#
# Usage:
#   orc start self-improve
name: self-improve
description: Autonomous self-improvement cycle that generates product and engineering ideas, debates and ranks them, implements the top picks, then runs iterative code review.

nodes:
  - id: setup
    command: |
      TIMESTAMP=$(date '+%Y%m%d-%H%M%S')
      BRANCH="self-improve/$(date +%Y-%m-%d)"
      git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
      mkdir -p {{orc_root}}/self-improve
      LAST=$(ls {{orc_root}}/self-improve/product-ideas-*.md 2>/dev/null | sed 's/.*-\([0-9]*\)\.md/\1/' | sort -n | tail -1)
      ITERATION=$(( ${LAST:-0} + 1 ))
      echo "${TIMESTAMP}:${ITERATION}"
    output: run_info

  - id: codebase-summary
    agent: claude-code
    depends_on: setup
    prompt: |
      Produce a concise codebase summary for downstream agents.

      1. Read CLAUDE.md, README.md, and any design/spec docs referenced there.
      2. Identify and list the project's modules/packages/targets with a one-line purpose each.
      3. Summarize the main features and commands currently available.
      4. Build and test the project using the commands from CLAUDE.md — report pass/fail and any warnings.
      5. Run `git log main..HEAD --oneline` — list recent branch changes.
      6. List any known gaps, TODOs, or incomplete features you notice.

      Output a single markdown document (do NOT save to disk).
    output: codebase_summary

  - id: product-manager
    agent: claude-code
    depends_on: codebase-summary
    prompt: |
      You are a product manager evaluating the product built in this repository.

      Here is a codebase summary prepared by a prior agent — use it instead of exploring from scratch:

      {{codebase_summary}}

      Read previous idea files in `{{orc_root}}/self-improve/` and `git log main..HEAD --oneline` to see what was already proposed or implemented — do NOT re-propose those ideas.

      If README.md contains a roadmap or planned features section, read it and use it as inspiration — propose ideas that advance or complement planned work.

      Produce a top 3 ranked product ideas or suggestions. Focus on:
      - User experience improvements
      - Missing features that would make the product more useful
      - Workflow ergonomics and discoverability
      - Error messages and user guidance
      - Documentation gaps from a user perspective

      Rank by impact (how much value it delivers to users) and feasibility.

      Format as a markdown file with:
      ```
      # Product Ideas — <date>  (Iteration <N>)

      ## 1. <Title>
      **Impact:** High/Medium/Low
      **Effort:** High/Medium/Low
      **Description:** ...
      **Rationale:** ...

      (repeat for each idea)
      ```

      Parse the run info "{{run_info}}" as TIMESTAMP:ITERATION (split on colon).
      Save the file to `{{orc_root}}/self-improve/product-ideas-<TIMESTAMP>-<ITERATION>.md`.

      Output the full path of the saved file.
    output: product_ideas_file

  - id: principal-engineer
    agent: claude-code
    depends_on: codebase-summary
    prompt: |
      You are a principal engineer evaluating the architecture and technical implementation of this repository.

      Here is a codebase summary prepared by a prior agent — use it instead of exploring from scratch:

      {{codebase_summary}}

      Read previous idea files in `{{orc_root}}/self-improve/` and `git log main..HEAD --oneline` to see what was already proposed or implemented — do NOT re-propose those ideas.

      If README.md contains a roadmap or planned features section, read it and use it as inspiration — propose ideas that advance or complement planned work.

       Produce a top 3 ranked engineering ideas about architecture and technical implementation. Focus on:
      - Architectural improvements (module boundaries, dependency flow, protocol design)
      - Performance opportunities (concurrency, caching, I/O) — for each performance idea, include a baseline estimate (e.g., "current: ~2s, expected: ~0.5s") and how to measure it so the improvement can be verified
      - Reliability and robustness (error handling, edge cases, resilience)
      - Code quality (duplication, complexity, testability)
      - Developer experience (build times, test ergonomics, debugging)

      Rank by technical impact and risk.

      Format as a markdown file with:
      ```
      # Engineering Ideas — <date>  (Iteration <N>)

      ## 1. <Title>
      **Impact:** High/Medium/Low
      **Risk:** High/Medium/Low
      **Description:** ...
      **Rationale:** ...

      (repeat for each idea)
      ```

      Parse the run info "{{run_info}}" as TIMESTAMP:ITERATION (split on colon).
      Save the file to `{{orc_root}}/self-improve/engineer-ideas-<TIMESTAMP>-<ITERATION>.md`.

      Output the full path of the saved file.
    output: engineer_ideas_file

  - id: adversarial-reviewer
    agent: claude-code
    depends_on:
      - product-manager
      - principal-engineer
    prompt: |
      You are an adversarial reviewer. Your job is to critically evaluate and debate the quality of proposed ideas, then select only the best for implementation.

      Read the two idea files:
      - {{product_ideas_file}}
      - {{engineer_ideas_file}}

      Also read CLAUDE.md and any design/spec docs referenced there to ground your evaluation in the project's actual goals and constraints.

      For each idea across both files, evaluate:
      1. **Is it actually a problem?** — Does evidence in the codebase support this being a real issue, or is it speculative?
      2. **Is the proposed approach sound?** — Are there simpler alternatives? Does it conflict with existing design decisions?
      3. **Is it worth the effort?** — Given the project's current stage, is this a priority or a distraction?
      4. **Risk assessment** — Could this introduce regressions, break existing workflows, or add unnecessary complexity?

      Be skeptical. Challenge assumptions. Push back on vague or low-impact suggestions.

      After your analysis, score each surviving idea on three axes (1-5):
      - **Value** — how much does this improve the product for users? Product ideas that advance the product in the right direction (new capabilities, UX improvements, workflow gaps) score highest. Engineering ideas score high only if they deliver measurable user-facing benefit (e.g., significant performance improvement users would notice). Internal refactors, code cleanup, and architectural changes with no direct user impact score low (1-2) unless they unblock high-value work.
      - **Feasibility** — can it be implemented in a single focused commit?
      - **Safety** — how unlikely is it to introduce regressions?

      Multiply the three scores to get a composite rank. Select the idea with the highest composite score. Break ties by preferring the safer option.

      Format as a markdown file with:
      ```
      # Task Selection — <date>  (Iteration <N>)

      ## Debate Summary
      (Brief overview of your evaluation process and key arguments)

      ## Rejected Ideas
      ### <Title> (from product/engineering)
      **Reason:** ...

      (repeat for each rejected idea)

      ## Selected Task
      ### <Title>
      **Source:** Product Ideas #N / Engineering Ideas #N
      **Priority:** P0/P1/P2
      **Description:** ...
      **Implementation notes:** ...
      ```

      Parse the run info "{{run_info}}" as TIMESTAMP:ITERATION (split on colon).
      Save the file to `{{orc_root}}/self-improve/tasks-<TIMESTAMP>-<ITERATION>.md`.

      Output the full path of the saved file.
    output: tasks_file

  - id: software-engineer
    workflow: .orc/workflows/implement-task.yaml
    depends_on: adversarial-reviewer
    on_failure: continue
    inputs:
      task_file: "{{tasks_file}}"

  - id: fix-loop
    workflow: .orc/workflows/fix-loop.yaml
    depends_on: software-engineer
    when: "{{software-engineer.status}} == 'completed'"
    inputs:
      workspace: "{{workspace}}"

output:
  product_ideas: "{{product_ideas_file}}"
  engineer_ideas: "{{engineer_ideas_file}}"
  tasks: "{{tasks_file}}"
  implementation: "{{software-engineer.output}}"
  review: "{{fix-loop.output}}"
