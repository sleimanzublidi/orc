# Single review-then-fix pass. Called by fix-loop as a nested workflow.
#
# The reviewer outputs a review file path (or "APPROVED" if clean).
# The fixer reads the review file and addresses each finding.
name: review-and-fix
description: Single pass — reviewer finds issues, fixer addresses them.

input:
  - name: agent
    type: string
    default: "claude-code"
  - name: review_file
    type: string
    default: ""
  - name: review_dir
    type: string
    default: "{{repo_root}}/.orc/reviews"
  - name: worktree_path
    type: string
    default: "{{repo_root}}"

nodes:
  - id: reviewer
    agent: "{{agent}}"
    prompt_file: "{{orc_root}}/prompts/code-reviewer.md"
    parameters:
      permission_mode: bypassPermissions
    output: review_output

  - id: fixer
    agent: "{{agent}}"
    prompt_file: "{{orc_root}}/prompts/code-fixer.md"
    parameters:
      permission_mode: bypassPermissions
    depends_on: [reviewer]
    when: "{{reviewer.status}} == 'completed' && {{review_output}} != 'APPROVED'"
    output: fix_result

output:
  review: "{{review_output}}"
  result: "{{fix_result | default: APPROVED}}"
