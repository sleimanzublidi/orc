# Unsupervised code review loop — reviews code/docs, fixes issues, repeats until clean.
#
# Usage:
#   orc start code-review-unsupervised
name: code-review-unsupervised
description: Iterative code and doc review loop that reviews changes, fixes issues, and repeats until no issues remain or 10 iterations.

nodes:
  - id: review
    agent: claude-code
    prompt: |
      You are a senior code reviewer. Conduct a thorough code and documentation review.

      Follow these steps exactly:

      1. **Prepare**: Read all docs and specs in the repo (CLAUDE.md, Docs/Specs/, README, etc.) to understand conventions, architecture, and requirements.

      2. **Gather changes**:
         - Check which branch you are on with `git branch --show-current`.
         - If on `main`: review unstaged/staged changes (`git diff`, `git diff --cached`) and commits not yet pushed (`git log origin/main..HEAD --oneline`). If origin/main doesn't exist, review recent unpushed commits.
         - If on a feature branch: review unstaged/staged changes AND all commits on this branch (`git log main..HEAD --oneline` with full diffs via `git log main..HEAD -p`).

      3. **Review**: Analyze every change for:
         - Correctness — logic bugs, off-by-one, nil/null safety, concurrency issues
         - Spec compliance — validate against Docs/Specs/ requirements
         - Code conventions — naming, structure, patterns per CLAUDE.md
         - Documentation accuracy — comments match code, docs reflect changes
         - Security — injection, unsafe operations, credential exposure
         - Test coverage — are new code paths tested?
         Use multiple parallel agents (swarm) if the changeset spans multiple modules.

      4. **Determine iteration number**: Count existing review report files in `.orc/reviews/` that start with `review-` to determine which iteration this is (first run = iteration 1).

      5. **Generate report**: Produce a markdown report with this structure:

         ```
         # Code Review Report
         ## Iteration: (iteration number)
         ## Timestamp: (current date and time)
         ## Branch: (branch name)
         ## Summary
         (1-2 sentence overview)
         ## Findings
         ### [P0] <title>
         - **File**: path/to/file:line
         - **Category**: bug | spec-violation | convention | security | docs | test-gap
         - **Description**: what's wrong
         - **Suggestion**: how to fix
         ### [P1] <title>
         ...
         ### [P2] <title>
         ...
         ## Verdict
         CLEAN — no actionable findings remain
         or
         NEEDS_WORK — N issues found (X P0, Y P1, Z P2)
         ```

         Priority levels:
         - **P0**: Bugs, security issues, spec violations — must fix
         - **P1**: Convention violations, missing tests, doc inaccuracies — should fix
         - **P2**: Suggestions, minor style — nice to have

      5. **Save report**: Write the report to `.orc/reviews/review-iteration-(N).md` where N is the iteration number.
         Create the `.orc/reviews/` directory if it doesn't exist.

      6. **Final output**: Output ONLY the word `APPROVED` if there are zero P0 and P1 findings. Otherwise output `NEEDS_WORK`.
    output: review_result
    loop:
      until: approved
      max_iterations: 10
      fresh_context: true
      prompt: |
        You are a senior code reviewer conducting another iteration of a review cycle.

        The previous iteration found issues and a fixer agent addressed them. Now re-review.

        Follow these steps exactly:

        1. **Prepare**: Read all docs and specs in the repo (CLAUDE.md, Docs/Specs/, README, etc.).

        2. **Read previous reports**: Read all files in `.orc/reviews/` to understand what was found and fixed in prior iterations. Focus on the most recent fix report.

        3. **Gather current changes**:
           - Check which branch you are on with `git branch --show-current`.
           - If on `main`: review unstaged/staged changes (`git diff`, `git diff --cached`) and commits not yet pushed.
           - If on a feature branch: review unstaged/staged changes AND all commits on this branch.

        4. **Review**: Analyze every change with fresh eyes — do NOT just re-check previous findings. Look for:
           - Correctness, spec compliance, conventions, documentation, security, test coverage
           - Regressions introduced by previous fixes
           - Issues missed in earlier iterations
           Use multiple parallel agents (swarm) if needed.

        5. **Determine iteration number**: Count existing review report files in `.orc/reviews/` that start with `review-` to determine which iteration this is.

        6. **Generate report**: Same markdown format as the review reports already in `.orc/reviews/`, with the current iteration number.

        7. **Save report**: Write to `.orc/reviews/review-iteration-(N).md` where N is the iteration number.

        8. **Final output**: Output ONLY `APPROVED` if zero P0 and P1 findings. Otherwise output `NEEDS_WORK`.

  - id: fix
    agent: claude-code
    depends_on: review
    when: "{{review_result}} != 'APPROVED'"
    prompt: |
      You are a senior engineer addressing code review feedback without any user interaction.

      Follow these steps exactly:

      1. **Read the review report**: Find the latest review report in `.orc/reviews/` (highest iteration number). Parse all findings.

      2. **Read repo guidelines**: Read CLAUDE.md, Docs/Specs/, and any relevant docs to understand conventions and requirements before making changes.

      3. **Triage findings**: For each finding, decide:
         - **Address**: the finding is valid per repo docs and guidelines
         - **Skip**: the finding conflicts with repo docs, is already correct, or is a false positive
         Document your reasoning for skipped items.

      4. **Fix by priority**: Address P0 findings first, then P1, then P2.
         - Use multiple parallel agents if fixes span independent modules.
         - Do NOT commit to git yet.
         - Ensure fixes don't introduce regressions — run `bash Scripts/build.sh` to verify the build passes after fixes.

      5. **Determine iteration number**: Use the same iteration number as the review report you are addressing.

      6. **Generate fix report**: Write a markdown report to `.orc/reviews/fixes-iteration-(N).md` where N is the iteration number:

         ```
         # Fix Report
         ## Iteration: (iteration number)
         ## Timestamp: (current date and time)
         ## Findings Addressed
         ### [P0] <title>
         - **Status**: Fixed | Skipped
         - **Action taken**: (what you changed, or why you skipped)
         - **Files modified**: path/to/file
         ### [P1] <title>
         ...
         ### [P2] <title>
         ...
         ## Build Verification
         (build result — pass/fail)
         ## Summary
         Addressed: N, Skipped: M, Total: N+M
         ```

      7. **Commit**: Stage ALL modified files (code fixes + both review and fix report docs) and commit with message: `[Claude] Address code review iteration (N) findings`.

      8. **Output**: Output `FIXES_APPLIED` when done.
    output: fix_result

output:
  review: "{{review_result}}"
  fixes: "{{fix_result}}"
